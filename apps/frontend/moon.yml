id: frontend
layer: application
language: typescript

tasks:
  dev:
    command: npm run dev
  build:
    command: npm run build
    inputs:
      - src/**/*
      - index.html
      - package.json
      - tsconfig.json
      - tsconfig.app.json
      - tsconfig.node.json
      - vite.config.ts
    outputs:
      - dist
